# ReadTheDocs configuration.
#
# This file is present but the ReadTheDocs integration is NOT yet enabled.
# To activate, connect the repository at https://readthedocs.org and point
# it to this configuration file.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"
  jobs:
    post_install:
      - pip install --group docs

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: pip
      path: .
